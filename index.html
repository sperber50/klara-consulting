<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>klara.consulting</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f7f6f3;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .domain {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 3rem;
    }

    h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .line {
      width: 40px;
      height: 1px;
      background: #bbb;
      margin: 0 auto 1.5rem;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #666;
      margin-bottom: 2.5rem;
    }

    a {
      color: #1a1a1a;
      font-size: 0.85rem;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    a:hover {
      border-color: #888;
    }

    .footer {
      margin-top: 4rem;
      font-size: 0.7rem;
      color: #bbb;
      letter-spacing: 0.05em;
    }

    .lang {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .lang button {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: #aaa;
      cursor: pointer;
      padding: 2px 4px;
      transition: color 0.2s;
    }

    .lang button.active, .lang button:hover { color: #333; }

    .lang span { color: #ddd; font-size: 0.75rem; }
  </style>
</head>
<body>

<div class="lang">
  <button class="active" onclick="setLang('de')">DE</button>
  <span>/</span>
  <button onclick="setLang('en')">EN</button>
</div>

<div class="card">
  <div class="domain">klara.consulting</div>
  <h1 id="headline">Wir sind bald für Sie da.</h1>
  <div class="line"></div>
  <p id="sub">Beratung an der Schnittstelle von Technologie, Künstlicher Intelligenz<br>und unternehmerischer Erfahrung – mit Fokus auf Intralogistik.</p>
  <a href="mailto:klaus.hiesgen@klara.consulting">klaus.hiesgen@klara.consulting</a>
  <div class="footer">© 2026 Klaus Hiesgen · klara.consulting</div>
</div>

<script>
  const c = {
    de: { headline: 'Wir sind bald für Sie da.', sub: 'Beratung an der Schnittstelle von Technologie, Künstlicher Intelligenz<br>und unternehmerischer Erfahrung – mit Fokus auf Intralogistik.' },
    en: { headline: 'Coming soon.', sub: 'Consulting at the intersection of technology, artificial intelligence<br>and entrepreneurial experience – with a focus on intralogistics.' }
  };
  function setLang(lang) {
    document.getElementById('headline').textContent = c[lang].headline;
    document.getElementById('sub').innerHTML = c[lang].sub;
    document.querySelectorAll('.lang button').forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang button[onclick="setLang('${lang}')"]`).classList.add('active');
  }
</script>
</body>
</html>
